global:
  namespace: &namespace default
  storageClass: &storageClass "local-path" # longhorn, local-path, hostPath

# Infra Structure ----------------------------------------------

infra-postgresql:
  fullnameOverride: postgres
  architecture: standalone

  image:
    repository: postgres
    tag: "15"

  auth:
    enablePostgresUser: true
    postgresPassword: "password"
    username: "postgres"
    database: "initDB"
    existingSecret: ""  # postgres-secret

  primary:
    service:
      type: NodePort # ClusterIP NodePort
      port: 5432
      nodePorts:
        postgresql: "30503"

    persistence:
      enabled: true
      size: 50Gi
#      storageClass: "" # → default StorageClass
      storageClass: *storageClass  # local-path veya hostPath için empty

    extraVolumes:
      - name: postgres-run
        emptyDir: { }

    extraVolumeMounts:
      - name: postgres-run
        mountPath: /var/run/postgresql

    configuration: |
      archive_mode = off

# Redis
infra-redis-shared:
  fullnameOverride: redis-shared
  image:
    repository: redis
    tag: "6.0"
  replica:
    replicaCount: 1
  auth:
    enabled: true
    password: "mypassword"
#    existingSecret: "redis-secret"
  master:
    persistence:
      enabled: false
      size: 8Gi
    service:
      type: NodePort
      port: 6379
      nodePorts:
        redis: "30018"

# Service-specific overrides
# Gateway ----------------------------------------------

api-gateway:
  enabled: true
  name: &name gateway
  nameOverride: *name
  image:
    repository: registry.bibanka.com/test/edulink-gateway
    tag: latest
  imagePullSecrets:
    - name: reg-hub-secret
  service:
    name: *name
    ports:
      - name: http
        port: 80
        targetPort: 5000
  extraEnvs:
    - name: ASPNETCORE_ENVIRONMENT
      value: Production
  container:
    name: *name
    port: 5000
  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: gateway.notioedu.com
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls:
      - secretName: wildcard-notio-tls
        hosts:
          - gateway.notioedu.com
    annotations:
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/rewrite-target: /$1
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
      nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
  configMap:
    name: *name
    appSettingsFile: files/AppSettings.json
  ocelotConfigMap:
    enabled: true
    name: *name
    ocelotFile: files/Ocelot.gateway.json

