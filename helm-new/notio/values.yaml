# Rest -------------------------------------------------

# TODO
ai-service:
  enabled: true
  nameOverride: ai-service
  image:
    repository: registry.bibanka.com/test/edulink-ai
    tag: latest
  imagePullSecrets:
    - name: reg-hub-secret


backend-service:
  enabled: true
  fullnameOverride: backend-api
  replicas: 1
  image:
    repository: registry.bibanka.com/test/notio-backend
    tag: "latest"
    pullPolicy: IfNotPresent
  imagePullSecrets:
    - name: reg-hub-secret
  service:
    port: 8080
  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: backend.notioedu.com
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls:
      - secretName: wildcard-notio-tls
        hosts:
          - backend.notioedu.com
  extraEnvs:
    - name: ASPNETCORE_ENVIRONMENT
      value: Production
    - name: ASPNETCORE_URLS
      value: "http://+:8080"
    - name: ConnectionStrings__DefaultConnection
      value: "Host=localhost;Port=5432;Database=edulink;Username=edulink_user;Password=edulink_pass_change_me"
    - name: ConnectionStrings__Redis
      value: "localhost:6379"
    - name: AiService__BaseUrl
      value: "http://ai-service:8000"
  configMap:
    name: backend-api
    appSettingsFile: files/AppSettings.json