name: Deploy Notio Landing

on:
  push:
    branches:
      - master
    paths:
      - "landing/**"
      - "k8s/notio-landing.yaml"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch:

env:
  REGISTRY: registry.notioedu.com
  LANDING_IMAGE: registry.notioedu.com/notio/landing

jobs:
  build-landing:
    name: Build and Push Landing Image
    runs-on: [github-k8s-runner]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode Registry Password
        id: decode_password
        run: |
          DECODED_PASSWORD=$(echo "${{ secrets.REGISTRY_PASSWORD }}" | base64 -d)
          echo "::add-mask::$DECODED_PASSWORD"
          echo "password=$DECODED_PASSWORD" >> $GITHUB_OUTPUT

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ steps.decode_password.outputs.password }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Landing
        uses: docker/build-push-action@v5
        with:
          context: ./landing
          file: ./landing/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.LANDING_IMAGE }}:${{ github.sha }}
            ${{ env.LANDING_IMAGE }}:latest
          cache-from: type=gha,scope=landing
          cache-to: type=gha,mode=max,scope=landing

  deploy-landing:
    name: Deploy Landing to Kubernetes
    runs-on: [self-hosted, github-k8s-runner]
    needs: build-landing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply landing manifest
        run: kubectl apply -f k8s/notio-landing.yaml

      - name: Update image and rollout
        run: |
          kubectl set image deployment/notio-landing \
            notio-landing=${{ env.LANDING_IMAGE }}:${{ github.sha }} \
            -n notio
          kubectl rollout status deployment/notio-landing -n notio --timeout=180s
