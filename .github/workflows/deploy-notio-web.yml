name: Deploy Notio Web Admin

on:
  push:
    branches:
      - claude/preschool-tracking-app-hYF8S
    paths:
      - 'mobile/**'
      - 'k8s/notio-web.yaml'
      - '.github/workflows/deploy-notio-web.yml'
  workflow_dispatch:

env:
  REGISTRY: registry.bibanka.com
  WEB_IMAGE: registry.bibanka.com/test/notio-web
  IMAGE_TAG: 1.0.0
  WEB_API_URL: https://notio.bidynod.com/api

jobs:
  build-web:
    name: Build & Push Web Admin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Registry
        run: echo "$REGISTRY_PASSWORD" | docker login registry.bibanka.com -u "$REGISTRY_USERNAME" --password-stdin
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Web Admin
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --file ./mobile/Dockerfile.web \
            --build-arg EXPO_PUBLIC_API_URL=${{ env.WEB_API_URL }} \
            --tag ${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }} \
            --push \
            ./mobile

  deploy-web:
    name: Deploy Web Admin To Vault
    runs-on: ubuntu-latest
    needs: [build-web]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply web admin manifest
        run: kubectl apply -f k8s/notio-web.yaml

      - name: Rollout restart deployment
        run: |
          kubectl rollout restart deployment/notio-web -n vault
          kubectl rollout status deployment/notio-web -n vault --timeout=180s

      - name: Show ingress
        run: kubectl get ingress notio-web -n vault -o wide
