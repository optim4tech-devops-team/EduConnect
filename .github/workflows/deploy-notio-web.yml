name: Deploy Notio Web Admin

on:
  push:
    branches:
      - master
    paths:
      - "admin-panel/**"
      - "k8s/notio-web.yaml"
      - ".github/workflows/deploy-notio-web.yml"
  workflow_dispatch:

env:
  REGISTRY: registry.notioedu.com
  WEB_IMAGE: registry.notioedu.com/notio/notio-web
  WEB_API_URL: /api

jobs:
  build-web:
    name: Build and Push Web Admin Image
    runs-on: [github-k8s-runner]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Web Admin
        uses: docker/build-push-action@v5
        with:
          context: ./admin-panel
          file: ./admin-panel/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VITE_API_URL=${{ env.WEB_API_URL }}
          tags: |
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
            ${{ env.WEB_IMAGE }}:latest
          cache-from: type=gha,scope=web-admin
          cache-to: type=gha,mode=max,scope=web-admin

  deploy-web:
    name: Deploy Web Admin to Kubernetes
    runs-on: [github-k8s-runner]
    needs: build-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Ensure namespace and image pull secret
        run: |
          kubectl create namespace notio --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry zot-regcred \
            -n notio \
            --docker-server=${{ env.REGISTRY }} \
            --docker-username=${{ secrets.REGISTRY_USERNAME }} \
            --docker-password='${{ secrets.REGISTRY_PASSWORD }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply certificate and web admin manifests
        run: |
          kubectl apply -f k8s/notio-certificate.yaml
          kubectl apply -f k8s/notio-web.yaml

      - name: Update image and rollout
        run: |
          kubectl set image deployment/notio-web \
            notio-web=${{ env.WEB_IMAGE }}:${{ github.sha }} \
            -n notio
          kubectl rollout status deployment/notio-web -n notio --timeout=180s
