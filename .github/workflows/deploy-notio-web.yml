name: Deploy Notio Web Admin

on:
  push:
    branches:
      - master
    paths:
      - 'mobile/**'
      - 'k8s/notio-web.yaml'
      - '.github/workflows/deploy-notio-web.yml'
  workflow_dispatch:

env:
  REGISTRY:  registry.bibanka.com
  WEB_IMAGE: registry.bibanka.com/test/notio-web
  WEB_API_URL: https://platform-notio.bidyno.com/api

jobs:
  build-web:
    name: Build & Push Web Admin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Registry
        run: echo "$REGISTRY_PASSWORD" | docker login registry.bibanka.com -u "$REGISTRY_USERNAME" --password-stdin
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Web Admin
        uses: docker/build-push-action@v5
        with:
          context: ./mobile
          file: ./mobile/Dockerfile.web
          platforms: linux/amd64
          push: true
          build-args: |
            EXPO_PUBLIC_API_URL=${{ env.WEB_API_URL }}
          tags: |
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
            ${{ env.WEB_IMAGE }}:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy-web:
    name: Deploy Web Admin To Vault
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply manifest
        run: |
          kubectl apply -f k8s/notio-web.yaml

      - name: Update image and rollout
        run: |
          kubectl set image deployment/notio-web \
            notio-web=${{ env.WEB_IMAGE }}:${{ github.sha }} \
            -n vault
          kubectl rollout status deployment/notio-web -n vault --timeout=120s
