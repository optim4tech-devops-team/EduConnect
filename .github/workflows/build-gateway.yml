name: API Gateway — Build & Deploy

on:
  push:
    branches: [master]
    paths:
      - 'api-gateway/**'
      - '.github/workflows/build-gateway.yml'
  workflow_dispatch:

env:
  IMAGE: registry.notioedu.com/notio/gateway

jobs:
  build:
    name: Build & Push API Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: registry.notioedu.com
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          file: ./api-gateway/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway

  deploy:
    name: Deploy to k8s (notio)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update image and rollout
        run: |
          kubectl set image deployment/notio-gateway \
            gateway=${{ env.IMAGE }}:${{ github.sha }} \
            -n notio
          kubectl rollout status deployment/notio-gateway -n notio --timeout=120s
