name: AI Service — Build & Deploy

on:
  push:
    branches: [master]
    paths:
      - 'ai-service/**'
      - '.github/workflows/build-ai-service.yml'
  workflow_dispatch:

env:
  IMAGE: registry.notioedu.com/notio/ai-service

jobs:
  build:
    name: Build & Push AI Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: registry.notioedu.com
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          file: ./ai-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha,scope=ai-service
          cache-to: type=gha,mode=max,scope=ai-service

  deploy:
    name: Deploy to k8s (notio)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update image and rollout
        run: |
          kubectl set image deployment/notio-ai \
            ai-service=${{ env.IMAGE }}:${{ github.sha }} \
            -n notio
          kubectl rollout status deployment/notio-ai -n notio --timeout=180s
