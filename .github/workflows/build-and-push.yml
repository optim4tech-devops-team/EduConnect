name: Build and Push EduLink Images

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'
      - 'ai-service/**'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:

env:
  REGISTRY:  registry.bibanka.com
  API_IMAGE: registry.bibanka.com/test/edulink-api
  AI_IMAGE:  registry.bibanka.com/test/edulink-ai

jobs:
  # ─── Backend ────────────────────────────────────────────────────────────────
  build-api:
    name: Build & Push Backend API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Registry
        run: echo "$REGISTRY_PASSWORD" | docker login registry.bibanka.com -u "$REGISTRY_USERNAME" --password-stdin
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push API
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/EduLink.Api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  deploy-api:
    name: Deploy Backend API
    runs-on: ubuntu-latest
    needs: build-api
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update image and rollout
        run: |
          kubectl set image deployment/edulink-api \
            edulink-api=${{ env.API_IMAGE }}:${{ github.sha }} \
            -n vault
          kubectl rollout status deployment/edulink-api -n vault --timeout=180s

  # ─── AI Service ─────────────────────────────────────────────────────────────
  build-ai:
    name: Build & Push AI Service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Registry
        run: echo "$REGISTRY_PASSWORD" | docker login registry.bibanka.com -u "$REGISTRY_USERNAME" --password-stdin
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          file: ./ai-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.AI_IMAGE }}:${{ github.sha }}
            ${{ env.AI_IMAGE }}:latest
          cache-from: type=gha,scope=ai
          cache-to: type=gha,mode=max,scope=ai

  deploy-ai:
    name: Deploy AI Service
    runs-on: ubuntu-latest
    needs: build-ai
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update image and rollout
        run: |
          kubectl set image deployment/edulink-ai \
            edulink-ai=${{ env.AI_IMAGE }}:${{ github.sha }} \
            -n vault
          kubectl rollout status deployment/edulink-ai -n vault --timeout=180s
