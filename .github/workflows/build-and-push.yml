name: Build and Push EduLink Images

on:
  push:
    branches:
      - claude/preschool-tracking-app-hYF8S
    paths:
      - 'backend/**'
      - 'ai-service/**'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:

env:
  REGISTRY: registry.bibanka.com
  API_IMAGE: registry.bibanka.com/test/edulink-api
  AI_IMAGE: registry.bibanka.com/test/edulink-ai
  IMAGE_TAG: 1.0.0

jobs:
  build-api:
    name: Build & Push Backend API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push API
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/EduLink.Api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.API_IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-ai:
    name: Build & Push AI Service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          file: ./ai-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.AI_IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Rollout Restart
    runs-on: ubuntu-latest
    needs: [build-api, build-ai]
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Rollout restart deployments
        run: |
          kubectl rollout restart deployment/edulink-api -n vault
          kubectl rollout restart deployment/edulink-ai -n vault
          kubectl rollout status deployment/edulink-api -n vault --timeout=120s
          kubectl rollout status deployment/edulink-ai -n vault --timeout=120s
