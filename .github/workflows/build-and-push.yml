name: Build and Push EduLink Images

on:
  push:
    branches:
      - claude/preschool-tracking-app-hYF8S
    paths:
      - 'backend/**'
      - 'ai-service/**'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:

env:
  REGISTRY: registry.bibanka.com
  API_IMAGE: registry.bibanka.com/test/edulink-api
  AI_IMAGE: registry.bibanka.com/test/edulink-ai
  IMAGE_TAG: 1.0.0

jobs:
  build-api:
    name: Build & Push Backend API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login registry.bibanka.com -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push API
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --file ./backend/EduLink.Api/Dockerfile \
            --tag ${{ env.API_IMAGE }}:${{ env.IMAGE_TAG }} \
            --push \
            ./backend

  build-ai:
    name: Build & Push AI Service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login registry.bibanka.com -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push AI Service
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --file ./ai-service/Dockerfile \
            --tag ${{ env.AI_IMAGE }}:${{ env.IMAGE_TAG }} \
            --push \
            ./ai-service

  deploy:
    name: Rollout Restart
    runs-on: ubuntu-latest
    needs: [build-api, build-ai]
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Rollout restart deployments
        run: |
          kubectl rollout restart deployment/edulink-api -n vault
          kubectl rollout restart deployment/edulink-ai -n vault
          kubectl rollout status deployment/edulink-api -n vault --timeout=120s
          kubectl rollout status deployment/edulink-ai -n vault --timeout=120s
