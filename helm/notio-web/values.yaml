image:
  repository: registry.bibanka.com/test/notio-web
  tag: "1.0.0"
  pullPolicy: Always

imagePullSecrets:
  - name: reg-hub-secret

namespace: vault

replicaCount: 1

service:
  port: 80

ingress:
  host: platform-notio.bidyno.com
  additionalHost: school.bidyno.com
  tlsSecret: wildcard-bidyno-tls
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
  apiBackend:
    service: edulink-api
    port: 80

readinessProbe:
  path: /healthz
  initialDelaySeconds: 10
  periodSeconds: 10
