image:
  repository: registry.notioedu.com/notio/notio-landing
  tag: "1.0.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

namespace: notio

replicaCount: 1

service:
  port: 80

ingress:
  host: notioedu.com
  additionalHost: www.notioedu.com
  tlsSecret: notioedu-wildcard-tls
  clusterIssuer: letsencrypt-prod
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"

readinessProbe:
  path: /
  initialDelaySeconds: 5
  periodSeconds: 10
