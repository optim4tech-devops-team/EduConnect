---
# Zot OCI Registry — registry.notioedu.com
# Namespace: registry (kendi namespace'inde izole çalışır)
apiVersion: v1
kind: Namespace
metadata:
  name: registry
  labels:
    app.kubernetes.io/name: zot-registry
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zot-config
  namespace: registry
data:
  config.json: |
    {
      "distSpecVersion": "1.1.0",
      "storage": {
        "rootDirectory": "/var/lib/registry",
        "gc": true,
        "gcDelay": "1h",
        "gcInterval": "6h"
      },
      "http": {
        "address": "0.0.0.0",
        "port": "5000",
        "auth": {
          "htpasswd": {
            "path": "/etc/zot/htpasswd"
          }
        }
      },
      "log": {
        "level": "info"
      },
      "extensions": {
        "search": {
          "enable": true
        },
        "ui": {
          "enable": true
        }
      }
    }
---
# htpasswd secret — şifreyi değiştirmek için:
#   htpasswd -nbB admin 'YeniSifre'
# çıktıyı aşağıdaki htpasswd alanına yapıştırın.
apiVersion: v1
kind: Secret
metadata:
  name: zot-htpasswd
  namespace: registry
type: Opaque
stringData:
  # admin:changeme123  — PRODUCTION'DA DEĞİŞTİRİN
  htpasswd: "admin:$2y$05$WR0IH7m2YxQFbFjRqmSxEOKSH5.3u5eT0KAqXdH/9Q6L9j2.FYLyS"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zot-registry-pvc
  namespace: registry
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zot-registry
  namespace: registry
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: zot-registry
  template:
    metadata:
      labels:
        app: zot-registry
    spec:
      containers:
        - name: zot
          image: ghcr.io/project-zot/zot-linux-amd64:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          args: ["serve", "/etc/zot/config.json"]
          volumeMounts:
            - name: config
              mountPath: /etc/zot/config.json
              subPath: config.json
            - name: htpasswd
              mountPath: /etc/zot/htpasswd
              subPath: htpasswd
            - name: data
              mountPath: /var/lib/registry
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: zot-config
        - name: htpasswd
          secret:
            secretName: zot-htpasswd
        - name: data
          persistentVolumeClaim:
            claimName: zot-registry-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: zot-registry
  namespace: registry
spec:
  selector:
    app: zot-registry
  ports:
    - port: 80
      targetPort: 5000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zot-registry
  namespace: registry
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/client-body-buffer-size: "1m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - registry.notioedu.com
      secretName: notioedu-registry-tls
  rules:
    - host: registry.notioedu.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zot-registry
                port:
                  number: 80
