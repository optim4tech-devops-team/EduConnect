apiVersion: v1
data:
  index.html: "<!DOCTYPE html>\n<html lang=\"tr\">\n  <head>\n    <meta charset=\"UTF-8\"
    />\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"
    />\n    <title>Notio | Anaokulu İletişim ve Yönetim Platformu</title>\n    <meta
    name=\"description\" content=\"Notio; anaokulları için fotoğraf paylaşımı, veli
    iletişimi, formlar, yoklama ve okul yönetimini tek bir uygulamada sunan modern
    preschool platformudur.\" />\n    <link rel=\"stylesheet\" href=\"./styles.css\"
    />\n  </head>\n  <body>\n\n    <!-- ═══ NAV ═══════════════════════════════════════════════════════════
    -->\n    <header class=\"site-nav\" id=\"top\">\n      <a class=\"brand\" href=\"#top\"
    aria-label=\"Notio ana sayfa\">\n        <img class=\"brand-mark\" src=\"./assets/notio-bird-mark.png\"
    alt=\"Notio\" />\n        <span class=\"brand-word\">notio</span>\n      </a>\n\n
    \     <nav class=\"nav-links\" aria-label=\"Bölümler\">\n        <a href=\"#ozellikler\">Özellikler</a>\n
    \       <a href=\"#mobil\">Mobil Uygulama</a>\n        <a href=\"#webpanel\">Web
    Paneli</a>\n        <a href=\"#roller\">Roller</a>\n        <a href=\"#nasil\">Nasıl
    Çalışır</a>\n        <a href=\"#sss\">SSS</a>\n      </nav>\n\n      <div class=\"nav-actions\">\n
    \       <a class=\"ghost-button\" href=\"#demo\">Demo Talep Et</a>\n        <a
    class=\"solid-button\" href=\"https://notio.bidynod.com\" target=\"_blank\" rel=\"noreferrer\">Panele
    Gir</a>\n      </div>\n    </header>\n\n    <main>\n\n      <!-- ═══ HERO ══════════════════════════════════════════════════════
    -->\n      <section class=\"hero\" id=\"hero\">\n        <div class=\"hero-copy\">\n
    \         <span class=\"eyebrow\">Anaokulları için yeni nesil platform</span>\n\n
    \         <div class=\"hero-brand\">\n            <img class=\"hero-mark\" src=\"./assets/notio-bird-mark.png\"
    alt=\"Notio\" />\n            <div>\n              <p class=\"hero-brand-name\">notio</p>\n
    \             <p class=\"hero-brand-story\">\n                Üç üst üste sayfa
    bilgi birikimini, kehribar tık ise teslim edilen ve veliye ulaşan akış duygusunu
    temsil eder.\n              </p>\n            </div>\n          </div>\n\n          <h1>\n
    \           Okul, öğretmen ve veli aynı dili konuşur.\n          </h1>\n\n          <p
    class=\"hero-lead\">\n            Notio; fotoğraf paylaşımı, veli iletişimi, dijital
    formlar, yoklama, rozetler ve okul yönetimini tek çatıda toplar. Resmi değil güven
    veren, çocuksu değil modern bir okul deneyimi kurar.\n          </p>\n\n          <div
    class=\"hero-actions\">\n            <a class=\"solid-button large\" href=\"#demo\">Ücretsiz
    Demo Al</a>\n            <a class=\"ghost-button large\" href=\"#ozellikler\">Özellikleri
    Gör</a>\n          </div>\n\n          <div class=\"hero-metrics\">\n            <article>\n
    \             <strong>9</strong>\n              <span>Çekirdek Modül</span>\n
    \           </article>\n            <article>\n              <strong>4</strong>\n
    \             <span>Kullanıcı Rolü</span>\n            </article>\n            <article>\n
    \             <strong>iOS & Android</strong>\n              <span>Mobil Uygulama</span>\n
    \           </article>\n            <article>\n              <strong>SaaS</strong>\n
    \             <span>Çok Kiracılı</span>\n            </article>\n          </div>\n
    \       </div>\n\n        <div class=\"hero-stage\" aria-label=\"Notio ürün sunumu\">\n
    \         <div class=\"stage-card stage-card-dark\">\n            <div class=\"stage-kicker\">Bugünün
    akışı</div>\n            <h2>Küçük Sıralar Anaokulu</h2>\n            <p>\n              Fotoğraf
    galerileri, veli mesajları, formlar ve olumlu gözlemler tek bir okul hikayesi
    halinde çalışır.\n            </p>\n            <div class=\"pill-row\">\n              <span
    class=\"pill\">\U0001F4F8 Galeri</span>\n              <span class=\"pill\">\U0001F4AC
    Mesajlar</span>\n              <span class=\"pill\">\U0001F4CB Formlar</span>\n
    \             <span class=\"pill\">\U0001F3C5 Rozetler</span>\n            </div>\n
    \         </div>\n\n          <div class=\"stage-card stage-card-light\">\n            <div
    class=\"stage-kicker accent\">Platform katmanı</div>\n            <h3>Yeni okul
    aç, yönetici ata, planı izle.</h3>\n            <p>SaaS seviyesi — tek ekranda
    tüm okul ve tenant akışları.</p>\n          </div>\n\n          <div class=\"stage-card
    stage-card-amber\">\n            <div class=\"stage-kicker amber\">Okul paneli</div>\n
    \           <h3>Sınıfları, velileri, paylaşımları ve formları yönet.</h3>\n            <p>Operasyonel
    akışlar okul bazında sade ve hızlı kalır.</p>\n          </div>\n        </div>\n
    \     </section>\n\n      <!-- ═══ STATS ══════════════════════════════════════════════════════
    -->\n      <div class=\"stats-strip\">\n        <div class=\"stat-item\">\n          <strong>500+</strong>\n
    \         <span>Aktif Öğrenci</span>\n        </div>\n        <div class=\"stat-divider\"></div>\n
    \       <div class=\"stat-item\">\n          <strong>%98</strong>\n          <span>Veli
    Memnuniyeti</span>\n        </div>\n        <div class=\"stat-divider\"></div>\n
    \       <div class=\"stat-item\">\n          <strong>24/7</strong>\n          <span>Teknik
    Destek</span>\n        </div>\n        <div class=\"stat-divider\"></div>\n        <div
    class=\"stat-item\">\n          <strong>OTP</strong>\n          <span>Güvenli
    Giriş</span>\n        </div>\n        <div class=\"stat-divider\"></div>\n        <div
    class=\"stat-item\">\n          <strong>SignalR</strong>\n          <span>Gerçek
    Zamanlı</span>\n        </div>\n      </div>\n\n      <!-- ═══ ÖZELLİKLER ════════════════════════════════════════════════
    -->\n      <section class=\"section\" id=\"ozellikler\">\n        <div class=\"section-heading\">\n
    \         <span class=\"eyebrow\">Neler Yapabilirsiniz</span>\n          <h2>Anaokulunun
    tüm ihtiyaçları tek platformda</h2>\n          <p>\n            Notio; akademik
    ağırlıklı değil, iletişim ve veli bağını güçlendiren 9 çekirdek modülle anaokulunuzu
    tam olarak dijitalleştirir.\n          </p>\n        </div>\n\n        <div class=\"feature-grid\">\n\n
    \         <article class=\"feature-card\">\n            <div class=\"feature-icon\">\n
    \             <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\"
    stroke-width=\"1.8\">\n                <rect x=\"3\" y=\"3\" width=\"18\" height=\"18\"
    rx=\"3\"/>\n                <circle cx=\"8.5\" cy=\"8.5\" r=\"1.5\"/>\n                <polyline
    points=\"21 15 16 10 5 21\"/>\n              </svg>\n            </div>\n            <h3>Fotoğraf
    & Galeri</h3>\n            <p>Sınıf anlarını yüksek kaliteli galerilerle velilerle
    paylaş. Ogrenci etiketleme ve onaylı yayın akışı ile her fotoğraf güvenle iletilir.</p>\n
    \         </article>\n\n          <article class=\"feature-card\">\n            <div
    class=\"feature-icon\">\n              <svg viewBox=\"0 0 24 24\" fill=\"none\"
    stroke=\"currentColor\" stroke-width=\"1.8\">\n                <path d=\"M21 15a2
    2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"/>\n              </svg>\n
    \           </div>\n            <h3>Veli İletişimi</h3>\n            <p>Öğretmen-veli
    birebir mesajlaşma, sınıf duyuruları ve anlık bildirimlerle velilerle gerçek zamanlı
    bağlantıda kal. SignalR altyapısı ile mesajlar anında iletilir.</p>\n          </article>\n\n
    \         <article class=\"feature-card\">\n            <div class=\"feature-icon\">\n
    \             <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\"
    stroke-width=\"1.8\">\n                <path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2
    0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"/>\n                <polyline points=\"14 2 14
    8 20 8\"/>\n                <line x1=\"16\" y1=\"13\" x2=\"8\" y2=\"13\"/>\n                <line
    x1=\"16\" y1=\"17\" x2=\"8\" y2=\"17\"/>\n              </svg>\n            </div>\n
    \           <h3>Dijital Formlar</h3>\n            <p>Kayıt, izin, sağlık, teslim
    ve bilgilendirme formlarını yeniden kullanılabilir şablonlarla dijitalleştir.
    Veliler telefondan doldurup onaylıyor.</p>\n          </article>\n\n          <article
    class=\"feature-card\">\n            <div class=\"feature-icon\">\n              <svg
    viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\">\n
    \               <circle cx=\"12\" cy=\"8\" r=\"4\"/>\n                <path d=\"M12
    12v9\"/>\n                <path d=\"M8 17l4-4 4 4\"/>\n                <circle
    cx=\"12\" cy=\"8\" r=\"1.5\" fill=\"currentColor\" stroke=\"none\"/>\n              </svg>\n
    \           </div>\n            <h3>Rozetler & Olumlu Gözlemler</h3>\n            <p>Öğrencilere
    rozet ver, gelişim notları ekle ve başarı anlarını velilerle paylaş. Klasik \"davranış
    takibi\" değil, kutlama ve motivasyon odaklı bir akış.</p>\n          </article>\n\n
    \         <article class=\"feature-card\">\n            <div class=\"feature-icon\">\n
    \             <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\"
    stroke-width=\"1.8\">\n                <path d=\"M17 21v-2a4 4 0 0 0-4-4H5a4 4
    0 0 0-4 4v2\"/>\n                <circle cx=\"9\" cy=\"7\" r=\"4\"/>\n                <path
    d=\"M23 21v-2a4 4 0 0 0-3-3.87\"/>\n                <path d=\"M16 3.13a4 4 0 0
    1 0 7.75\"/>\n              </svg>\n            </div>\n            <h3>Öğrenci
    & Veli Yönetimi</h3>\n            <p>Öğrenci profilleri, veli ilişkilendirme,
    teslim yetkisi, alerji ve sağlık notları tek bir ekranda. Veli-öğrenci bağı metadata
    ile tam tanımlı.</p>\n          </article>\n\n          <article class=\"feature-card\">\n
    \           <div class=\"feature-icon\">\n              <svg viewBox=\"0 0 24
    24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\">\n                <rect
    x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"2\" ry=\"2\"/>\n                <line
    x1=\"16\" y1=\"2\" x2=\"16\" y2=\"6\"/>\n                <line x1=\"8\" y1=\"2\"
    x2=\"8\" y2=\"6\"/>\n                <line x1=\"3\" y1=\"10\" x2=\"21\" y2=\"10\"/>\n
    \               <path d=\"M9 16l2 2 4-4\"/>\n              </svg>\n            </div>\n
    \           <h3>Yoklama Takibi</h3>\n            <p>Günlük toplu yoklama kaydı,
    sınıf ve tarih bazlı raporlama. Öğrenci bazlı devamsızlık özetini tek bakışta
    gör, veliye bildir.</p>\n          </article>\n\n          <article class=\"feature-card\">\n
    \           <div class=\"feature-icon\">\n              <svg viewBox=\"0 0 24
    24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\">\n                <path
    d=\"M18 8h1a4 4 0 0 1 0 8h-1\"/>\n                <path d=\"M2 8h16v9a4 4 0 0
    1-4 4H6a4 4 0 0 1-4-4V8z\"/>\n                <line x1=\"6\" y1=\"1\" x2=\"6\"
    y2=\"4\"/>\n                <line x1=\"10\" y1=\"1\" x2=\"10\" y2=\"4\"/>\n                <line
    x1=\"14\" y1=\"1\" x2=\"14\" y2=\"4\"/>\n              </svg>\n            </div>\n
    \           <h3>Bildirimler & Duyurular</h3>\n            <p>Push bildirim, SMS
    ve e-posta fallback ile hiçbir mesaj kaybolmaz. Okul geneli, sınıf odaklı veya
    bireysel duyuruları anında gönder.</p>\n          </article>\n\n          <article
    class=\"feature-card\">\n            <div class=\"feature-icon\">\n              <svg
    viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\">\n
    \               <circle cx=\"11\" cy=\"11\" r=\"8\"/>\n                <line x1=\"21\"
    y1=\"21\" x2=\"16.65\" y2=\"16.65\"/>\n              </svg>\n            </div>\n
    \           <h3>AI Yüz Tanıma</h3>\n            <p>Grup fotoğraflarında öğrencileri
    otomatik etiketle. Face enrollment ile yüz verisi kayıt edilir, paylaşım akışı
    zeki ve hızlı hale gelir.</p>\n          </article>\n\n          <article class=\"feature-card
    feature-card--highlight\">\n            <div style=\"display:flex;align-items:center;gap:32px;flex-wrap:wrap;\">\n
    \             <div style=\"flex:1;min-width:240px;\">\n                <div class=\"feature-icon\"
    style=\"margin-bottom:12px;\">\n                  <svg viewBox=\"0 0 24 24\" fill=\"none\"
    stroke=\"currentColor\" stroke-width=\"1.8\">\n                    <rect x=\"2\"
    y=\"3\" width=\"20\" height=\"14\" rx=\"2\" ry=\"2\"/>\n                    <line
    x1=\"8\" y1=\"21\" x2=\"16\" y2=\"21\"/>\n                    <line x1=\"12\"
    y1=\"17\" x2=\"12\" y2=\"21\"/>\n                  </svg>\n                </div>\n
    \               <h3>SaaS Platform Yönetimi</h3>\n                <p>Çok kiracılı
    mimari ile binlerce okulu tek çatı altında yönet. Her okul kendi verisini görür;
    platform admini tümüne erişir.</p>\n              </div>\n              <div style=\"display:flex;gap:12px;flex-wrap:wrap;\">\n
    \               <div style=\"padding:14px 18px;border-radius:14px;background:rgba(32,73,55,.06);border:1px
    solid rgba(32,73,55,.12);\">\n                  <strong style=\"display:block;font-size:0.82rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--primary);margin-bottom:4px;\">Platform
    Admin</strong>\n                  <span style=\"font-size:0.9rem;color:var(--muted);\">Okul
    oluştur, yönetici ata, plan/kota yönet</span>\n                </div>\n                <div
    style=\"padding:14px 18px;border-radius:14px;background:rgba(227,160,79,.08);border:1px
    solid rgba(227,160,79,.2);\">\n                  <strong style=\"display:block;font-size:0.82rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--accent-deep);margin-bottom:4px;\">Okul
    Admin</strong>\n                  <span style=\"font-size:0.9rem;color:var(--muted);\">Sınıf,
    öğretmen, öğrenci, veli, form yönetimi</span>\n                </div>\n              </div>\n
    \           </div>\n          </article>\n\n        </div>\n      </section>\n\n
    \     <!-- ═══ MOBİL UYGULAMA ════════════════════════════════════════════ -->\n
    \     <section class=\"section app-section\" id=\"mobil\">\n        <div class=\"app-copy\">\n
    \         <span class=\"eyebrow\">iOS & Android</span>\n          <h2>Öğretmen
    ve veli için ayrı deneyimler</h2>\n          <p>\n            Notio mobil uygulaması
    iki farklı role göre özelleşir. Telefon + OTP girişinin ardından sistem rolünüzü
    tanır ve size özel akışı açar.\n          </p>\n\n          <div class=\"mobile-split\">\n
    \           <div class=\"mobile-role-card mobile-role-card--teacher\">\n              <div
    class=\"mobile-role-header\">\n                <span class=\"role-label\">\U0001F469‍\U0001F3EB
    Öğretmen</span>\n              </div>\n              <ul class=\"app-features\">\n
    \               <li>\n                  <svg viewBox=\"0 0 24 24\" fill=\"none\"
    stroke=\"currentColor\" stroke-width=\"2\"><polyline points=\"20 6 9 17 4 12\"/></svg>\n
    \                 Sınıf öğrenci listesi ve profiller\n                </li>\n
    \               <li>\n                  <svg viewBox=\"0 0 24 24\" fill=\"none\"
    stroke=\"currentColor\" stroke-width=\"2\"><polyline points=\"20 6 9 17 4 12\"/></svg>\n
    \                 Fotoğraf çek, etiketle, yayınla\n                </li>\n                <li>\n
    \                 <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\"
    stroke-width=\"2\"><polyline points=\"20 6 9 17 4 12\"/></svg>\n                  Rozet
    ver ve olumlu gözlem ekle\n                </li>\n                <li>\n                  <svg
    viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><polyline
    points=\"20 6 9 17 4 12\"/></svg>\n                  Veli ile birebir mesajlaşma\n
    \               </li>\n                <li>\n                  <svg viewBox=\"0
    0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><polyline points=\"20
    6 9 17 4 12\"/></svg>\n                  Günlük yoklama kaydı\n                </li>\n
    \               <li>\n                  <svg viewBox=\"0 0 24 24\" fill=\"none\"
    stroke=\"currentColor\" stroke-width=\"2\"><polyline points=\"20 6 9 17 4 12\"/></svg>\n
    \                 Günlük rapor ve form takibi\n                </li>\n              </ul>\n
    \           </div>\n\n            <div class=\"mobile-role-card mobile-role-card--parent\">\n
    \             <div class=\"mobile-role-header\">\n                <span class=\"role-label\"
    style=\"background:rgba(82,160,183,.12);border-color:rgba(82,160,183,.2);color:#1a6080;\">\U0001F468‍\U0001F469‍\U0001F467
    Veli</span>\n              </div>\n              <ul class=\"app-features\">\n
    \               <li>\n                  <svg viewBox=\"0 0 24 24\" fill=\"none\"
    stroke=\"currentColor\" stroke-width=\"2\"><polyline points=\"20 6 9 17 4 12\"/></svg>\n
    \                 Çocuğuna ait fotoğraf galerisi\n                </li>\n                <li>\n
    \                 <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\"
    stroke-width=\"2\"><polyline points=\"20 6 9 17 4 12\"/></svg>\n                  Rozet
    ve gelişim notlarını görüntüle\n                </li>\n                <li>\n
    \                 <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\"
    stroke-width=\"2\"><polyline points=\"20 6 9 17 4 12\"/></svg>\n                  Öğretmenle
    direkt mesajlaşma\n                </li>\n                <li>\n                  <svg
    viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><polyline
    points=\"20 6 9 17 4 12\"/></svg>\n                  Dijital formlara cevap ver
    ve onayla\n                </li>\n                <li>\n                  <svg
    viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><polyline
    points=\"20 6 9 17 4 12\"/></svg>\n                  Anlık bildirimler ve duyurular\n
    \               </li>\n                <li>\n                  <svg viewBox=\"0
    0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><polyline points=\"20
    6 9 17 4 12\"/></svg>\n                  Devamsızlık ve yoklama geçmişi\n                </li>\n
    \             </ul>\n            </div>\n          </div>\n\n          <div class=\"app-store-buttons\">\n
    \           <a class=\"store-button\" href=\"#\">\n              <svg viewBox=\"0
    0 24 24\" fill=\"currentColor\"><path d=\"M18.71 19.5c-.83 1.24-1.71 2.45-3.05
    2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25
    17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78
    0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02
    2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13
    1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z\"/></svg>\n
    \             <span>\n                <small>İndir</small>\n                App
    Store\n              </span>\n            </a>\n            <a class=\"store-button\"
    href=\"#\">\n              <svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><path
    d=\"M3.18 23.76c.33.18.7.22 1.06.12l12.5-7.22-2.9-2.9-10.66 9.99zM20.54 10.04L17.3
    8.17l-3.22 3.02 3.22 3.01 3.25-1.88c.93-.54.93-1.74-.01-2.28zM1.94.25C1.62.55
    1.42 1.03 1.42 1.65v20.7c0 .62.2 1.1.53 1.4l.07.06L13.1 12.74v-.26L2.02.19l-.08.06zM14.81
    11.52L3.18.28l.07.06 11.56 11.18z\"/></svg>\n              <span>\n                <small>İndir</small>\n
    \               Google Play\n              </span>\n            </a>\n          </div>\n
    \       </div>\n\n        <div class=\"app-visual\">\n          <div class=\"phone-mockup\">\n
    \           <div class=\"phone-screen\">\n              <div class=\"phone-notch\"></div>\n
    \             <div class=\"phone-content\">\n                <div class=\"mock-header\">\n
    \                 <div class=\"mock-avatar\"></div>\n                  <div>\n
    \                   <div class=\"mock-line mock-line--name\"></div>\n                    <div
    class=\"mock-line mock-line--sub\"></div>\n                  </div>\n                </div>\n
    \               <div class=\"mock-stat-row\">\n                  <div class=\"mock-stat\"><div
    class=\"mock-stat-num\"></div><div class=\"mock-stat-label\"></div></div>\n                  <div
    class=\"mock-stat\"><div class=\"mock-stat-num\"></div><div class=\"mock-stat-label\"></div></div>\n
    \                 <div class=\"mock-stat\"><div class=\"mock-stat-num\"></div><div
    class=\"mock-stat-label\"></div></div>\n                </div>\n                <div
    class=\"mock-card\">\n                  <div class=\"mock-img\"></div>\n                  <div
    style=\"margin-top:10px;\">\n                    <div class=\"mock-line mock-line--md\"></div>\n
    \                   <div class=\"mock-line mock-line--sm\" style=\"margin-top:6px;\"></div>\n
    \                 </div>\n                </div>\n                <div class=\"mock-card\">\n
    \                 <div class=\"mock-line mock-line--md\"></div>\n                  <div
    class=\"mock-line mock-line--sm\" style=\"margin-top:6px;\"></div>\n                </div>\n
    \               <div class=\"mock-action-row\">\n                  <div class=\"mock-action\"></div>\n
    \                 <div class=\"mock-action\"></div>\n                </div>\n
    \             </div>\n            </div>\n          </div>\n        </div>\n      </section>\n\n
    \     <!-- ═══ WEB YÖNETİM PANELİ ═══════════════════════════════════════ -->\n
    \     <section class=\"section\" id=\"webpanel\">\n        <div class=\"section-heading\">\n
    \         <span class=\"eyebrow\">Web Yönetim Paneli</span>\n          <h2>İki
    katmanlı güçlü bir yönetim yapısı</h2>\n          <p>\n            Platform seviyesinde
