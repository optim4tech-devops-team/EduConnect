  styles.css: "/* ═══════════════════════════════════════════════════════════════════════\r\n
    \  NOTIO LANDING — Design System\r\n   ═══════════════════════════════════════════════════════════════════════
    */\r\n:root {\r\n  --bg: #f6f1e8;\r\n  --bg-soft: #fcfaf6;\r\n  --surface: rgba(255,
    255, 255, 0.78);\r\n  --surface-strong: #ffffff;\r\n  --surface-tint: #eef5f0;\r\n
    \ --surface-amber: #fff0dc;\r\n  --line: rgba(27, 45, 39, 0.1);\r\n  --text: #1b2d27;\r\n
    \ --muted: #64736b;\r\n  --primary: #204937;\r\n  --primary-strong: #17362a;\r\n
    \ --accent: #e3a04f;\r\n  --accent-deep: #b76f1c;\r\n  --shadow: 0 22px 60px rgba(21,
    39, 31, 0.12);\r\n  --display: \"Iowan Old Style\", \"Palatino Linotype\", \"Book
    Antiqua\", Georgia, serif;\r\n  --body: \"Avenir Next\", \"Segoe UI\", \"Helvetica
    Neue\", sans-serif;\r\n  --radius-card: 28px;\r\n  --radius-lg: 34px;\r\n}\r\n\r\n*
    { box-sizing: border-box; }\r\nhtml { scroll-behavior: smooth; }\r\n\r\nbody {\r\n
    \ margin: 0;\r\n  min-height: 100vh;\r\n  color: var(--text);\r\n  font-family:
    var(--body);\r\n  background:\r\n    radial-gradient(circle at top left, rgba(227,
    160, 79, 0.2), transparent 28%),\r\n    radial-gradient(circle at 85% 18%, rgba(45,
    106, 79, 0.17), transparent 24%),\r\n    linear-gradient(180deg, #fbf7f1 0%, #f4efe6
    100%);\r\n}\r\n\r\nbody::before {\r\n  content: \"\";\r\n  position: fixed;\r\n
    \ inset: 0;\r\n  background-image:\r\n    linear-gradient(rgba(32, 73, 55, 0.025)
    1px, transparent 1px),\r\n    linear-gradient(90deg, rgba(32, 73, 55, 0.025) 1px,
    transparent 1px);\r\n  background-size: 32px 32px;\r\n  pointer-events: none;\r\n
    \ mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.55), transparent 78%);\r\n}\r\n\r\n/*
    ─── Layout ─────────────────────────────────────────────────────────── */\r\nmain,
    .site-footer {\r\n  width: min(1360px, calc(100vw - 40px));\r\n  margin: 0 auto;\r\n}\r\n\r\nmain
    { padding-bottom: 0; }\r\n\r\n/* ─── Typography ───────────────────────────────────────────────────────
    */\r\nh1, h2, h3, h4 {\r\n  margin: 0;\r\n  font-family: var(--display);\r\n  font-weight:
    700;\r\n  letter-spacing: -0.04em;\r\n}\r\n\r\nh1 { font-size: clamp(3.4rem, 7vw,
    5.8rem); line-height: 0.97; max-width: 11.5ch; }\r\nh2 { font-size: clamp(2.4rem,
    4vw, 4rem);   line-height: 0.98; }\r\nh3 { font-size: clamp(1.6rem, 2.5vw, 2rem);
    line-height: 1.02; }\r\n\r\np { margin: 0; }\r\n\r\n/* ─── Nav ───────────────────────────────────────────────────────────────
    */\r\n.site-nav {\r\n  position: sticky;\r\n  top: 18px;\r\n  z-index: 100;\r\n
    \ width: min(1360px, calc(100vw - 40px));\r\n  margin: 18px auto 0;\r\n  display:
    flex;\r\n  align-items: center;\r\n  justify-content: space-between;\r\n  gap:
    24px;\r\n  padding: 16px 20px;\r\n  background: rgba(255, 252, 247, 0.82);\r\n
    \ border: 1px solid rgba(27, 45, 39, 0.08);\r\n  border-radius: 22px;\r\n  backdrop-filter:
    blur(18px);\r\n  box-shadow: 0 14px 30px rgba(22, 38, 30, 0.06);\r\n}\r\n\r\n.brand
    {\r\n  display: inline-flex;\r\n  align-items: center;\r\n  gap: 14px;\r\n  color:
    inherit;\r\n  text-decoration: none;\r\n}\r\n\r\n.brand-mark, .hero-mark { display:
    block; width: 54px; height: 54px; }\r\n\r\n.brand-word, .hero-brand-name {\r\n
