apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: notioedu-wildcard-tls
  namespace: notio
spec:
  secretName: notioedu-wildcard-tls
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-prod
  dnsNames:
    - notioedu.com
    - www.notioedu.com
    - platform.notioedu.com
    - apigw.notioedu.com
  usages:
    - digital signature
    - key encipherment
