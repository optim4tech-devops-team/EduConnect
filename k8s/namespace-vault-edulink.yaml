---
# PostgreSQL StatefulSet
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: edulink-postgres-pvc
  namespace: vault
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: edulink-postgres
  namespace: vault
spec:
  serviceName: edulink-postgres
  replicas: 1
  selector:
    matchLabels:
      app: edulink-postgres
  template:
    metadata:
      labels:
        app: edulink-postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          env:
            - name: POSTGRES_DB
              value: edulink
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: edulink-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: edulink-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "edulink_user", "-d", "edulink"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: edulink-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: edulink-postgres
  namespace: vault
spec:
  selector:
    app: edulink-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
# Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edulink-redis
  namespace: vault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edulink-redis
  template:
    metadata:
      labels:
        app: edulink-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: edulink-redis
  namespace: vault
spec:
  selector:
    app: edulink-redis
  ports:
    - port: 6379
      targetPort: 6379
---
# Secrets
apiVersion: v1
kind: Secret
metadata:
  name: edulink-secrets
  namespace: vault
type: Opaque
stringData:
  POSTGRES_USER: edulink_user
  POSTGRES_PASSWORD: edulink_pass_change_me
  JWT_SECRET: your-super-secret-jwt-key-change-in-production-min-32-chars
  JWT_EXPIRY_MINUTES: "60"
  JWT_REFRESH_EXPIRY_DAYS: "30"
  CLOUDINARY_CLOUD_NAME: "placeholder"
  CLOUDINARY_API_KEY: "placeholder"
  CLOUDINARY_API_SECRET: "placeholder"
  FIREBASE_SERVER_KEY: "placeholder"
  AI_SERVICE_API_KEY: "ai-internal-key-change-me"
---
# AI Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edulink-ai
  namespace: vault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edulink-ai
  template:
    metadata:
      labels:
        app: edulink-ai
    spec:
      imagePullSecrets:
        - name: reg-hub-secret
      containers:
        - name: edulink-ai
          image: registry.bibanka.com/test/edulink-ai:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: edulink-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: edulink-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@edulink-postgres:5432/edulink"
            - name: AI_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: edulink-secrets
                  key: AI_SERVICE_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: edulink-ai
  namespace: vault
spec:
  selector:
    app: edulink-ai
  ports:
    - port: 80
      targetPort: 8000
---
# Backend API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edulink-api
  namespace: vault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edulink-api
  template:
    metadata:
      labels:
        app: edulink-api
    spec:
      imagePullSecrets:
        - name: reg-hub-secret
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z edulink-postgres 5432; do echo waiting for postgres; sleep 2; done']
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z edulink-redis 6379; do echo waiting for redis; sleep 2; done']
      containers:
        - name: edulink-api
          image: registry.bibanka.com/test/edulink-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_URLS
              value: http://+:5000
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: edulink-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: edulink-secrets
                  key: POSTGRES_PASSWORD
            - name: ConnectionStrings__DefaultConnection
              value: "Host=edulink-postgres;Database=edulink;Username=edulink_user;Password=edulink_pass_change_me"
            - name: ConnectionStrings__Redis
              value: "edulink-redis:6379"
            - name: Jwt__Secret
              valueFrom:
                secretKeyRef:
                  name: edulink-secrets
                  key: JWT_SECRET
            - name: Jwt__ExpiryMinutes
              valueFrom:
                secretKeyRef:
                  name: edulink-secrets
                  key: JWT_EXPIRY_MINUTES
            - name: Jwt__RefreshExpiryDays
              valueFrom:
                secretKeyRef:
                  name: edulink-secrets
                  key: JWT_REFRESH_EXPIRY_DAYS
            - name: Cloudinary__CloudName
              valueFrom:
                secretKeyRef:
                  name: edulink-secrets
                  key: CLOUDINARY_CLOUD_NAME
            - name: Cloudinary__ApiKey
              valueFrom:
                secretKeyRef:
                  name: edulink-secrets
                  key: CLOUDINARY_API_KEY
            - name: Cloudinary__ApiSecret
              valueFrom:
                secretKeyRef:
                  name: edulink-secrets
                  key: CLOUDINARY_API_SECRET
            - name: AiService__BaseUrl
              value: "http://edulink-ai"
            - name: AiService__ApiKey
              valueFrom:
                secretKeyRef:
                  name: edulink-secrets
                  key: AI_SERVICE_API_KEY
            - name: Firebase__ServerKey
              valueFrom:
                secretKeyRef:
                  name: edulink-secrets
                  key: FIREBASE_SERVER_KEY
          readinessProbe:
            httpGet:
              path: /swagger/index.html
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: edulink-api
  namespace: vault
spec:
  selector:
    app: edulink-api
  ports:
    - port: 80
      targetPort: 5000
---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: edulink-api
  namespace: vault
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - edulink.bidyno.com
      secretName: wildcard-bidyno-tls
  rules:
    - host: edulink.bidyno.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: edulink-api
                port:
                  number: 80
