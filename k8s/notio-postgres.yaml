apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: notio-postgres
  namespace: notio
spec:
  serviceName: notio-postgres
  replicas: 1
  selector:
    matchLabels:
      app: notio-postgres
  template:
    metadata:
      labels:
        app: notio-postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: edulink
            - name: POSTGRES_USER
              value: edulink_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notio-postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - edulink_user
                - -d
                - edulink
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - edulink_user
                - -d
                - edulink
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        storageClassName: local-path
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: notio-postgres
  namespace: notio
spec:
  type: ClusterIP
  selector:
    app: notio-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
