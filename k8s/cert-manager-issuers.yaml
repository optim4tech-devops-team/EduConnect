---
# cert-manager — Let's Encrypt HTTP-01 Challenge
#
# HTTP-01 için port 80'in dışarıdan erişilebilir olması gerekir.
# DNS: notioedu.com → 159.146.61.2 ✓
#      registry.notioedu.com → 159.146.61.2 ✓
#
# ─── Kurulum sırası ──────────────────────────────────────────────────────────
#
# 1. cert-manager kur (bir kez):
#    kubectl --kubeconfig C:\kubeconfig-192.168.1.120.yaml apply \
#      -f https://github.com/cert-manager/cert-manager/releases/download/v1.15.3/cert-manager.yaml
#
#    kubectl --kubeconfig C:\kubeconfig-192.168.1.120.yaml \
#      -n cert-manager wait --for=condition=Available deployment --all --timeout=120s
#
# 2. Bu dosyayı uygula:
#    kubectl --kubeconfig C:\kubeconfig-192.168.1.120.yaml apply -f k8s/cert-manager-issuers.yaml

# ─── ClusterIssuer — Staging (test, rate-limit yok) ─────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: sezer.darendeli@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
---
# ─── ClusterIssuer — Production ──────────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: sezer.darendeli@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
---
# ─── Certificate — notio namespace (notioedu.com + www.notioedu.com) ─────────
#
# DNS KAYITLARI (registrar'dan eklenecek):
#   notioedu.com      A    159.146.61.2
#   www.notioedu.com  A    159.146.61.2
#
# kubectl apply -f k8s/cert-manager-issuers.yaml
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: notioedu-wildcard-tls
  namespace: notio
spec:
  secretName: notioedu-wildcard-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "notioedu.com"
    - "www.notioedu.com"
---
# ─── Certificate — registry namespace (registry.notioedu.com) ────────────────
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: notioedu-registry-tls
  namespace: registry
spec:
  secretName: notioedu-registry-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "registry.notioedu.com"
