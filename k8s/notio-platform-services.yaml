---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notio-redis
  namespace: notio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notio-redis
  template:
    metadata:
      labels:
        app: notio-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notio-redis
  namespace: notio
spec:
  selector:
    app: notio-redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notioedu-api
  namespace: notio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notioedu-api
  template:
    metadata:
      labels:
        app: notioedu-api
    spec:
      imagePullSecrets:
        - name: zot-regcred
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z notio-postgres 5432; do echo waiting for postgres; sleep 2; done"]
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z notio-redis 6379; do echo waiting for redis; sleep 2; done"]
      containers:
        - name: notioedu-api
          image: registry.notioedu.com/notio/notioedu-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_URLS
              value: http://+:5000
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notio-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: ConnectionStrings__DefaultConnection
              value: "Host=notio-postgres;Port=5432;Database=edulink;Username=edulink_user;Password=$(POSTGRES_PASSWORD)"
            - name: ConnectionStrings__Redis
              value: "notio-redis:6379"
            - name: Jwt__Secret
              valueFrom:
                secretKeyRef:
                  name: notio-api-secrets
                  key: JWT_SECRET
            - name: Jwt__ExpiryMinutes
              value: "60"
            - name: Jwt__RefreshExpiryDays
              value: "30"
            - name: Cloudinary__CloudName
              valueFrom:
                secretKeyRef:
                  name: notio-api-secrets
                  key: CLOUDINARY_CLOUD_NAME
                  optional: true
            - name: Cloudinary__ApiKey
              valueFrom:
                secretKeyRef:
                  name: notio-api-secrets
                  key: CLOUDINARY_API_KEY
                  optional: true
            - name: Cloudinary__ApiSecret
              valueFrom:
                secretKeyRef:
                  name: notio-api-secrets
                  key: CLOUDINARY_API_SECRET
                  optional: true
            - name: AiService__BaseUrl
              value: "http://notio-ai"
            - name: AiService__ApiKey
              valueFrom:
                secretKeyRef:
                  name: notio-api-secrets
                  key: AI_SERVICE_API_KEY
                  optional: true
            - name: Firebase__ServerKey
              valueFrom:
                secretKeyRef:
                  name: notio-api-secrets
                  key: FIREBASE_SERVER_KEY
                  optional: true
            - name: Sms__Mode
              value: "Mock"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 45
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: notioedu-api
  namespace: notio
spec:
  type: ClusterIP
  selector:
    app: notioedu-api
  ports:
    - port: 80
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apigw
  namespace: notio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apigw
  template:
    metadata:
      labels:
        app: apigw
    spec:
      imagePullSecrets:
        - name: zot-regcred
      containers:
        - name: apigw
          image: registry.notioedu.com/notio/apigw:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_URLS
              value: http://+:5000
            - name: ReverseProxy__Clusters__backend-cluster__Destinations__destination1__Address
              value: http://notioedu-api:80
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: apigw
  namespace: notio
spec:
  type: ClusterIP
  selector:
    app: apigw
  ports:
    - port: 80
      targetPort: 5000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apigw
  namespace: notio
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - apigw.notioedu.com
      secretName: notioedu-wildcard-tls
  rules:
    - host: apigw.notioedu.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: apigw
                port:
                  number: 80
