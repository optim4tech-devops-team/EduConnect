---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notio-landing
  namespace: notio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notio-landing
  template:
    metadata:
      labels:
        app: notio-landing
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: html-files
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            - name: html-files
              mountPath: /usr/share/nginx/html/styles.css
              subPath: styles.css
            - name: assets
              mountPath: /usr/share/nginx/html/assets/notio-bird-mark.png
              subPath: notio-bird-mark.png
      volumes:
        - name: nginx-conf
          configMap:
            name: notio-landing-nginx-conf
        - name: html-files
          configMap:
            name: notio-landing-files
        - name: assets
          secret:
            secretName: notio-landing-assets
---
apiVersion: v1
kind: Service
metadata:
  name: notio-landing
  namespace: notio
spec:
  selector:
    app: notio-landing
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: notio-landing
  namespace: notio
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - notioedu.com
        - www.notioedu.com
      secretName: notioedu-wildcard-tls
  rules:
    - host: notioedu.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: notio-landing
                port:
                  number: 80
    - host: www.notioedu.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: notio-landing
                port:
                  number: 80
